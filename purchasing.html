<div class="dashboard">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Purchasing</h2>
    <button class="btn btn-primary rounded-pill" onclick="openPurchaseModal()">
      <i class="bi bi-plus-circle"></i> Tambah
    </button>
  </div>
  
  <div class="glass mt-4">
    <input class="form-control rounded-pill mb-3" id="searchPurchase" placeholder="Search item / vendor..." onkeyup="filterPurchase()">
  
    <div class="table-responsive mt-3">
      <table class="table table-hover">
        <thead class="table-dark">
          <tr>
            <th>Date</th>
            <th>Item</th>
            <th>Part No</th>
            <th>Merk</th>
            <th>Vendor</th>
            <th>Qty</th>
            <th>Total</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="purchaseTable">
          <!-- Data akan dimuat dari API Google Sheets -->
        </tbody>
      </table>
    </div>
  </div>
  
</div>
  
<!-- MODAL TAMBAH DATA -->
<div class="modal fade" id="purchaseModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-5">
      <div class="modal-header">
        <h5>Input Purchasing</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
  
      <div class="modal-body">
        <input type="date" class="form-control mb-2" id="p_date">
        <!-- Untuk select, datanya perlu di-fetch dari sheet Master Data nanti -->
        <select class="form-control mb-2" id="p_item" onchange="selectItem()">
           <option value="">-- Pilih Item --</option>
        </select>
        <input class="form-control mb-2" id="p_part" placeholder="Part Number">
        
        <select class="form-control mb-2" id="p_merk">
          <option value="">-- Pilih Merk --</option>
        </select>
        <input class="form-control mb-2" id="p_unit" placeholder="Unit">
        
        <select class="form-control mb-2" id="p_vendor">
          <option value="">-- Pilih Vendor --</option>
        </select>
        <input class="form-control mb-2" id="p_satuan" placeholder="Satuan">
        <input type="number" class="form-control mb-2" id="p_qty" placeholder="Qty" onkeyup="calculateTotal()">
        <input type="number" class="form-control mb-2" id="p_price" placeholder="Price" onkeyup="calculateTotal()">
        <input class="form-control mb-2" id="p_total" placeholder="Total" readonly>
        <input class="form-control mb-2" id="p_inv" placeholder="Invoice">
        <input class="form-control mb-2" id="p_pic" placeholder="PIC">
        <input class="form-control mb-2" id="p_job" placeholder="Job Site">
      </div>
  
      <div class="modal-footer">
        <button class="btn btn-primary w-100 rounded-pill" onclick="savePurchase()">SAVE</button>
      </div>
    </div>
  </div>
</div>
