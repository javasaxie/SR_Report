<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Purchasing Sparepart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <!-- Tombol Menu Mobile (Hanya muncul di layar kecil) -->
  <button class="btn btn-primary d-md-none hamburger-btn" onclick="toggleSidebar()">
    <i class="bi bi-list"></i>
  </button>

  <!-- Overlay untuk menutup sidebar saat klik di luar -->
  <div class="sidebar-overlay d-md-none" onclick="toggleSidebar()"></div>

  <div class="app-container d-flex">
    
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="p-3">
        <h3><i class="bi bi-box-seam"></i> Sparepart</h3>
        <hr>
        <button class="btn btn-outline-primary w-100 mb-2" onclick="loadPage('dashboard')">Dashboard</button>
        <button class="btn btn-outline-primary w-100 mb-2" onclick="loadPage('purchasing')">Purchasing</button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content flex-grow-1 p-4">
      <div id="page"></div>
    </div>

  </div>

  <!-- SCRIPT -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Fungsi untuk Toggle Sidebar
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('active');
      document.querySelector('.sidebar-overlay').classList.toggle('show');
    }
  </script>
  <script src="js/app.js"></script>

</body>
</html>
