<h2>Dashboard</h2>
<hr>
<div class="row">
  <div class="col-md-6">
    <div class="card bg-primary text-white p-3">
      <h5>Total Purchase</h5>
      <h3 id="totalPurchaseDisplay">Loading...</h3>
    </div>
  </div>
</div>

<script>
  // Fungsi ini otomatis dipanggil oleh app.js setelah halaman dirender
  async function initDashboard() {
    // Memanggil aksi 'getDashboard' ke Google Apps Script
    let response = await callAPI('getDashboard');
    
    if (response) {
      document.getElementById('totalPurchaseDisplay').innerText = "Rp " + response.totalPurchase.toLocaleString();
    }
  }
</script>
